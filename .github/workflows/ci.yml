name: CI

on: [push]

jobs:
  tests:
    name: "Salary-Streaming Contract Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: "Install dependencies"
        run: npm ci
      - name: "Validate contract exists"
        run: |
          echo "Validating Salary-Streaming contract structure..."
          ls -la contracts/
          echo "Contract file found: $(wc -l < contracts/Salary-Streaming.clar) lines"
          echo "✅ Contract validation complete"
