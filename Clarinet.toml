[project]
name = 'Salary-Streaming'
description = 'Smart contract for streaming salary payments with leave management'
authors = []
telemetry = true
cache_dir = './.cache'
requirements = []

[contracts.Salary-Streaming]
path = 'contracts/Salary-Streaming.clar'
clarity_version = 3
epoch = 3.1

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'